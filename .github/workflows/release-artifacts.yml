# Сборка артефактов релиза (CLI wheel/sdist, browser-extension dist) без публикации в registry.
# Триггеры: ручной запуск или git-теги вида v*.
name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build CLI (wheel + sdist)
        run: |
          python -m pip install --upgrade pip build
          cd cli && python -m build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json

      - name: Build browser extension
        run: |
          cd browser-extension
          npm ci
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voice-transcriber-release-${{ github.sha }}
          path: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
          if-no-files-found: error

      - name: Upload extension dist (zip-friendly tree)
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-dist-${{ github.sha }}
          path: browser-extension/dist/
          if-no-files-found: error
