<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Upload audio — Voice Transcriber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 16px;
        max-width: 420px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        color: #333;
      }
      .err {
        color: #b00020;
      }
      .ok {
        color: #0a6;
      }
    </style>
  </head>
  <body>
    <h2 style="margin: 0 0 8px; font-size: 16px">Upload audio file</h2>
    <p style="margin: 0 0 12px; font-size: 13px; color: #444">
      Uses the same <code>POST /api/upload</code> as the extension popup (new conversation if none in URL).
    </p>
    <input type="file" id="file" accept="audio/*,.webm,.wav,.mp3,.m4a,.aac,.ogg,.flac,.opus" />
    <pre id="log"></pre>
    <script type="module" src="/src/upload/main.ts"></script>
  </body>
</html>
