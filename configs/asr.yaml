# ASR — выбор движка и модели (см. server/core/config.py, app/asr/factory.py).
#
# default_provider — fallback, если не заданы realtime_provider / final_provider.
# realtime_provider — WebSocket / chunk ASR (API). final_provider — Celery batch ASR.
# recognition_model — модель для default_provider; realtime_recognition_model /
# final_recognition_model — явные модели для соответствующего tier.
# Env: VT_ASR_REALTIME_PROVIDER, VT_ASR_FINAL_PROVIDER, VT_ASR_REALTIME_MODEL, VT_ASR_FINAL_MODEL.
#
default_provider: whisper
recognition_model: medium
realtime_provider: whisper
final_provider: gigaam
final_recognition_model: v3_e2e_rnnt

providers:
  whisper:
    enabled: true
    model: medium
  faster_whisper:
    enabled: true
    model: medium
  vosk:
    enabled: true
    model: default
    # Распакованная модель Vosk (en/small и т.д.); можно задать через env VOSK_MODEL_PATH
    model_path: null
  gigaam:
    enabled: true
    # Варианты: v3_e2e_rnnt (рекомендуется), v3_e2e_ctc, v3_rnnt, …
    model: v3_e2e_rnnt
    # Длинные файлы: transcribe_longform (нужен VT_HF_TOKEN и образ worker-final-gpu)
    longform_enabled: true
    hf_token_env: VT_HF_TOKEN
    model_cache_dir: /models

