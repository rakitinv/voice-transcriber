# Limits configuration (см. ТЗ §5, дорожная карта Этап 0)

max_duration_seconds: 7200       # 2h
max_file_size_bytes: 524288000   # 500MB
max_ttl_days: 30

# Realtime (гибрид: сервер задаёт границы и дефолт)
allowed_realtime_modes:
  - chunk
  - windowed
default_realtime_mode: windowed
chunk_ms_min: 500
chunk_ms_max: 3000
media_chunk_ms_max: 2000
max_window_ms: 20000
window_overlap_ms: 1500
fast_persist_interval_s: 12
fast_persist_min_audio_s: 3.0

# R6 (опц.): offload realtime fast ASR to Celery asr_fast when API load high — experimental
realtime_fast_via_celery: false
realtime_fast_offload_min_active_asr: 3

# Автопродление (ТЗ §7): хвост догружается в A перед стартом B
autoprolong_enabled: false
autoprolong_tail_seconds: 3

