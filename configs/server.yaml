# Server configuration (skeleton)

environment: development
host: 0.0.0.0
port: 8000

# Хост `postgres` — только внутри docker-compose. На хосте для Alembic задайте VT_DATABASE_URL
# (см. server/README.md). Порт на хост задаётся в docker-compose (POSTGRES_PUBLISH_PORT, по умолчанию 5435).
database:
  url: postgresql+psycopg2://voice:voice@postgres/voice

redis:
  url: redis://redis:6379/0

s3:
  endpoint: http://minio:9000
  bucket: voice-transcriber
  access_key: CHANGE_ME
  secret_key: CHANGE_ME

auth:
  google:
    client_id: "395246762197-o54uq6qo022f1mrg5qack56vob1id8is.apps.googleusercontent.com"
    client_secret: "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"
  yandex:
    client_id: "e7e743fa8de649bbbdce2c873d868265"
    client_secret: "95877b39703d4c26ab445544b0a9f1d6"
  # ADMIN_OPS sprint 6: Redis-backed IP lockout after failed refresh / bad API key (see AUTH_AND_IDENTITY.md §9).
  lockout:
    enabled: true
    refresh_invalid_max_per_ip: 40
    api_key_invalid_max_per_ip: 80
    window_seconds: 900
    block_seconds: 900
  login_audit:
    enabled: true
    include_client_fingerprint: true
    # Удаление старых строк auth_signin_events и pipeline_events (Celery cleanup); 0 — не удалять автоматически.
    retention_days: 90

# Ops-консоль (docs/ADMIN_OPS_CONSOLE.md): внешние ссылки и шаблон deep-link в Web UI.
# В Docker можно переопределить список целиком через VT_ADMIN_EXTERNAL_TOOLS_JSON.
admin_console:
  external_tools: []
