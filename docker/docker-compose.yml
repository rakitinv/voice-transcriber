version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8002:8000"
      - "5680:5678" # Порт для отладчика
    environment:
      PYTHONPATH: /app/server
      VT_ENVIRONMENT: production
      VT_WEBUI_ORIGIN: http://localhost:3002
      VT_DATABASE_URL: postgresql+psycopg2://voice:voice@postgres:5432/voice
      VT_REDIS_URL: redis://redis:6379/0
      VT_S3_ENDPOINT: http://minio:9000
      VT_S3_BUCKET: voice-transcriber
      VT_S3_ACCESS_KEY: minioadmin
      VT_S3_SECRET_KEY: minioadmin
    volumes:
      - ../configs:/app/configs:ro
      - ../server/logs:/app/server/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - voice-transcriber

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      PYTHONPATH: /app/server
      VT_ENVIRONMENT: production
      VT_DATABASE_URL: postgresql+psycopg2://voice:voice@postgres:5432/voice
      VT_REDIS_URL: redis://redis:6379/0
      VT_S3_ENDPOINT: http://minio:9000
      VT_S3_BUCKET: voice-transcriber
      VT_S3_ACCESS_KEY: minioadmin
      VT_S3_SECRET_KEY: minioadmin
    volumes:
      - ../configs:/app/configs:ro
      - ../server/logs:/app/server/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: python -m celery -A workers.celery_app.celery_app worker --loglevel=info --queues=asr,diarization,llm,cleanup
    networks:
      - voice-transcriber

  webui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.webui
      args:
        VITE_API_BASE_URL: http://localhost:8002
    ports:
      - "3002:3000"
    depends_on:
      - api
    networks:
      - voice-transcriber

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    networks:
      - voice-transcriber

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voice
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voice-transcriber

  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - voice-transcriber

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  voice-transcriber:
    driver: bridge

