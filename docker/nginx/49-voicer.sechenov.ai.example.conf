# Пример для балансировщика (49-voicer.conf). Замените 10.2.1.173 на IP хоста с Docker.
#
# Ошибка без ``location /api/``: запросы ``/api/auth/google``, ``/api/settings/*`` попадают
# в ``location /`` → Web UI (порт 3002) → в ответ HTML вместо JSON/редиректа OAuth.

server {
    listen 443 ssl;
    http2 on;
    server_name voicer.sechenov.ai;

    # … ssl, gzip, headers …

    # 1) Продуктовый API (OAuth, разговоры, /api/settings/*) — порт 8002
    location /api/ {
        proxy_pass http://10.2.1.173:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 2) Admin API — порт 8003 (длиннее, чем /admin/)
    location /admin/api/ {
        proxy_pass http://10.2.1.173:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3) OAuth редирект: …/admin#token (без слэша) → не в Web UI
    location = /admin {
        return 301 $scheme://$host/admin/$is_args$args;
    }

    # 4) Admin Web UI — порт 3003
    location /admin/ {
        proxy_pass http://10.2.1.173:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 100m;

    # 5) Основной Web UI — порт 3002 (последним среди префиксов «/»)
    location / {
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$web_pool;
    }
}
