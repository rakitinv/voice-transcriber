# Example: one host, Web UI at /, Admin Web UI at /admin/, product API at /api/, Admin API at /admin/api/.
# Adjust upstream ports to match docker compose publish on the host.
#
# admin-webui image: nginx maps ``/admin/assets/…`` → ``dist/assets/…``. OAuth redirect is often
# ``https://host/admin#tokens`` (no trailing slash) — add ``location = /admin`` below so it does not hit Web UI.
#
# Do NOT use ``try_files`` with SPA fallback for ``/admin/assets/`` — that returns index.html instead of JS.

server {
    listen 443 ssl http2;
    server_name voicer.example.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API — must be above ``location /admin/`` (longer prefix).
    location /admin/api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 $scheme://$host/admin/$is_args$args;
    }

    # Admin Web UI static SPA.
    location /admin/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
