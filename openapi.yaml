openapi: 3.0.3
info:
  title: Voice Transcriber API
  version: 0.4.0
  description: |
    Источник правды HTTP API (см. [docs/TECHNICAL_SPECIFICATION.md](docs/TECHNICAL_SPECIFICATION.md)).

    **Аутентификация и сессия** (OAuth расширения, refresh сервиса, идентичность): [docs/AUTH_AND_IDENTITY.md](docs/AUTH_AND_IDENTITY.md).

    **WebSocket** (канон контракта: [docs/WEBSOCKET.md](docs/WEBSOCKET.md)):
    - `ws://{host}/ws/audio/{conversation_id}` — аудио-чанки (не под префиксом `/api`)
    - `ws://{host}/ws/transcript/{conversation_id}` — обновления транскрипта

    JWT: в dev — query `access_token` или `Sec-WebSocket-Protocol: bearer.<JWT>`; в **production** только subprotocol (query отклоняется). Переменные `VT_WS_ALLOW_QUERY_TOKEN`, `VT_WS_REQUIRE_SUBPROTOCOL`. Детали — в WEBSOCKET.md.

servers:
  - url: http://localhost:8000
    description: Локальная разработка
  - url: "{baseUrl}"
    description: Произвольный хост
    variables:
      baseUrl:
        default: http://localhost:8000

tags:
  - name: auth
    description: OAuth2 провайдеров, токены сервиса (access/refresh), профиль (`/me`)
  - name: conversations
    description: Разговоры
  - name: upload
    description: Пакетная загрузка аудио
  - name: search
    description: Поиск по транскриптам
  - name: settings
    description: Лимиты сервера и пользовательские настройки
  - name: websocket
    description: |
      Realtime (не HTTP JSON). OAS 3 не описывает Upgrade; ниже — зафиксированные URL и параметры.
      Реализация FastAPI — см. docs/WEBSOCKET.md.
  - name: admin
    description: |
      Admin / Ops API (отдельный процесс в docker: сервис **admin-api**, порт по умолчанию 8003).
      Тот же Bearer JWT, что у основного API; требуется строка в `admin_memberships`.
      См. docs/ADMIN_OPS_CONSOLE.md (§9 — без содержимого чужих разговоров).

paths:
  /api/auth/google:
    get:
      tags: [auth]
      summary: Старт OAuth Google
      description: |
        Редирект на Google. Для Ops-консоли: `?client=admin&next=<URL SPA>` — ``next`` должен входить в allowlist
        ``VT_ADMIN_WEBUI_ORIGIN`` / ``VT_ADMIN_WEBUI_ORIGINS`` на сервисе API (тот же redirect_uri у провайдера, что у Web UI).
      parameters:
        - name: client
          in: query
          required: false
          schema:
            type: string
            enum: [admin, extension]
          description: Для админки передать `admin` вместе с `next`.
        - name: next
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: При `client=admin` — origin админ-SPA (например `http://localhost:3003`).
      responses:
        "302":
          description: Redirect на провайдера или Web UI / admin-webui (после callback)
        "400":
          description: Некорректные параметры (например admin без allowlist для `next`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/auth/google/callback:
    get:
      tags: [auth]
      summary: Callback OAuth Google
      responses:
        "302":
          description: Redirect в Web UI с токеном
  /api/auth/yandex:
    get:
      tags: [auth]
      summary: Старт OAuth Yandex
      description: |
        Аналогично GET `/api/auth/google` — для админки `?client=admin&next=...` при настроенном allowlist.
      parameters:
        - name: client
          in: query
          required: false
          schema:
            type: string
            enum: [admin, extension]
        - name: next
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect
        "400":
          description: Некорректные параметры (admin без allowlist)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/auth/yandex/callback:
    get:
      tags: [auth]
      summary: Callback OAuth Yandex
      responses:
        "302":
          description: Redirect

  /api/auth/google/extension/authorize-url:
    get:
      tags: [auth]
      summary: Прямой URL Google OAuth для расширения (как Web UI)
      description: |
        Возвращает `auth_url` провайдера с `redirect_uri` на сервер (`/api/auth/google/callback`), как при GET `/api/auth/google`.
        Расширение делает `fetch` этого URL из popup, затем `chrome.identity.launchWebAuthFlow(auth_url)` — окно открывается сразу на Google,
        без первого перехода на localhost внутри identity-flow. Параметр `prompt=select_account` для выбора аккаунта.
      parameters:
        - name: client
          in: query
          schema:
            type: string
            default: extension
        - name: next
          in: query
          required: true
          description: `chrome.identity.getRedirectURL(...)` — только `https://*.chromiumapp.org/*`.
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "400":
          description: Недопустимый next
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/auth/yandex/extension/authorize-url:
    get:
      tags: [auth]
      summary: Прямой URL Yandex OAuth для расширения (как Web UI)
      description: |
        Как GET `/api/auth/yandex`, с `force_confirm=yes`, чтобы экран Яндекса показывался и можно было выбрать/подтвердить аккаунт.
      parameters:
        - name: client
          in: query
          schema:
            type: string
            default: extension
        - name: next
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "400":
          description: Недопустимый next
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/auth/me:
    get:
      tags: [auth]
      summary: Текущий пользователь
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMe"
        "401":
          description: Не авторизован

  /api/auth/google/link/start:
    get:
      tags: [auth]
      summary: URL авторизации Google для привязки к текущему аккаунту (C7.4)
      description: |
        Требуется Bearer JWT. После успеха провайдер перенаправляет на `/api/auth/google/link/callback`,
        затем браузер попадает на Web UI `/settings?oauth_link=success`. Зарегистрируйте callback URI в консоли Google.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "401":
          description: Не авторизован

  /api/auth/google/link/callback:
    get:
      tags: [auth]
      summary: Callback OAuth привязки Google
      responses:
        "302":
          description: Redirect на `/settings?oauth_link=success|error&…`

  /api/auth/yandex/link/start:
    get:
      tags: [auth]
      summary: URL авторизации Yandex для привязки к текущему аккаунту (C7.4)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "401":
          description: Не авторизован

  /api/auth/yandex/link/callback:
    get:
      tags: [auth]
      summary: Callback OAuth привязки Yandex
      responses:
        "302":
          description: Redirect на `/settings?oauth_link=success|error&…`

  /api/auth/google/extension/start:
    get:
      tags: [auth]
      operationId: authGoogleExtensionStart
      summary: URL авторизации Google для расширения
      description: |
        Возвращает готовый `auth_url` для `chrome.identity.launchWebAuthFlow`.
        Предпочтительный способ получить authorize URL (единый источник с сервером); см. [docs/AUTH_AND_IDENTITY.md](docs/AUTH_AND_IDENTITY.md) §6.
      parameters:
        - name: redirect_uri
          in: query
          required: true
          description: Результат `chrome.identity.getRedirectURL(...)` — только `https://*.chromiumapp.org/*`.
          schema:
            type: string
            format: uri
        - name: code_challenge
          in: query
          required: true
          description: PKCE S256 challenge (RFC 7636), см. C7.3.
          schema:
            type: string
            minLength: 43
            maxLength: 128
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256]
            default: S256
        - name: ux_mode
          in: query
          required: false
          description: silent — без UI провайдера если возможно (Google `prompt=none`); interactive — обычный вход.
          schema:
            type: string
            enum: [silent, interactive]
            default: interactive
        - name: account_prompt
          in: query
          required: false
          description: force — усиленный выбор аккаунта (Google consent / Yandex force_confirm).
          schema:
            type: string
            enum: [normal, force]
            default: normal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "400":
          description: Недопустимый redirect_uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/auth/yandex/extension/start:
    get:
      tags: [auth]
      operationId: authYandexExtensionStart
      summary: URL авторизации Yandex для расширения
      description: |
        Аналогично `/api/auth/google/extension/start` для провайдера Yandex.
        См. [docs/AUTH_AND_IDENTITY.md](docs/AUTH_AND_IDENTITY.md).
      parameters:
        - name: redirect_uri
          in: query
          required: true
          description: Результат `chrome.identity.getRedirectURL(...)` — только `https://*.chromiumapp.org/*`.
          schema:
            type: string
            format: uri
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
            minLength: 43
            maxLength: 128
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256]
            default: S256
        - name: ux_mode
          in: query
          required: false
          schema:
            type: string
            enum: [silent, interactive]
            default: interactive
        - name: account_prompt
          in: query
          required: false
          schema:
            type: string
            enum: [normal, force]
            default: normal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAuthUrlResponse"
        "400":
          description: Недопустимый redirect_uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/auth/google/extension/finalize:
    post:
      tags: [auth]
      operationId: authGoogleExtensionFinalize
      summary: Обмен code на токены сервиса (расширение, Google)
      description: |
        Обменивает OAuth2 `code` с redirect `*.chromiumapp.org` на **токены сервиса** (JWT доступа; после C7.2 — опционально `refresh_token` сервиса).
        Токены провайдера клиенту не возвращаются. См. [docs/AUTH_AND_IDENTITY.md](docs/AUTH_AND_IDENTITY.md).
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: code_verifier
          in: query
          required: true
          description: PKCE (RFC 7636), пара к `code_challenge` из `/extension/start`.
          schema:
            type: string
            minLength: 43
            maxLength: 128
        - name: state
          in: query
          required: true
          description: Значение `state` из redirect провайдера (подписанный JWT сервера).
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionFinalizeResponse"
        "400":
          description: Неверный или истёкший code, ошибка обмена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Отказ провайдера или невалидный запрос
        "409":
          description: Email уже занят другим пользователем — слияние аккаунтов через Web UI (C7.4)

  /api/auth/yandex/extension/finalize:
    post:
      tags: [auth]
      operationId: authYandexExtensionFinalize
      summary: Обмен code на токены сервиса (расширение, Yandex)
      description: Аналогично `/api/auth/google/extension/finalize` для провайдера Yandex.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: code_verifier
          in: query
          required: true
          description: PKCE (RFC 7636).
          schema:
            type: string
            minLength: 43
            maxLength: 128
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionFinalizeResponse"
        "400":
          description: Неверный или истёкший code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Отказ провайдера
        "409":
          description: Email уже занят другим пользователем — слияние аккаунтов через Web UI (C7.4)

  /api/auth/refresh:
    post:
      tags: [auth]
      operationId: authRefresh
      summary: Новый access JWT по refresh-токену сервиса
      description: |
        Продление сессии **без** повторного OAuth провайдера. Контракт и модель — [docs/AUTH_AND_IDENTITY.md](docs/AUTH_AND_IDENTITY.md) §4 (C7.2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRefreshResponse"
        "400":
          description: Некорректное тело запроса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Невалидный или отозванный refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "429":
          description: Слишком много неуспешных попыток refresh с данного IP (см. `auth.lockout` в server.yaml, Redis)
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
    post:
      tags: [conversations]
      summary: Создать разговор
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationCreate"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Нарушение лимитов
    get:
      tags: [conversations]
      summary: Список разговоров
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: skip
          schema: { type: integer, default: 0 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: recording_session_id
          schema:
            type: string
            format: uuid
          required: false
          description: Фильтр по §7 recording_session_id (цепочка автопродления)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"

  /api/conversations/{conversation_id}:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    get:
      tags: [conversations]
      summary: Получить разговор
      parameters:
        - in: query
          name: tier
          required: false
          schema:
            type: string
            enum: [auto, fast, final]
            default: auto
          description: >
            Вариант транскрипта: auto — активный указатель; fast — ревизия с meta.processing_tier=fast;
            final — успешная диаризация или последний успешный ASR не из ветки fast (§17 ТЗ).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Разговор найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Не найдено
    delete:
      tags: [conversations]
      summary: Удалить разговор (soft delete)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Удалено
        "404":
          description: Не найдено

  /api/conversations/{conversation_id}/export:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
      - in: query
        name: format
        required: true
        schema:
          type: string
          enum: [md, json]
      - in: query
        name: tier
        required: false
        schema:
          type: string
          enum: [auto, fast, final]
          default: auto
        description: Какую ветку экспортировать (те же значения, что у GET разговора).
    get:
      tags: [conversations]
      summary: Экспорт транскрипта
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Файл или JSON
        "404":
          description: Не найдено

  /api/conversations/{conversation_id}/session-summary:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    get:
      tags: [conversations]
      summary: Сводка LLM по цепочке записи (§7.6)
      description: >
        Один rolling Markdown-summary на всю сессию `recording_session_id` (автопродление).
        Полезная нагрузка помимо этого ответа — также в S3 и в расширенном GET разговора.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Статус и текст сводки (если уже посчитана)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingSessionSummary"
        "404":
          description: Не найдено

  /api/conversations/{conversation_id}/session-summary/retry:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    post:
      tags: [conversations]
      summary: Повторить генерацию сводки по цепочке (§7.6)
      description: Ставит задачу `summarize_recording_session` в очередь Celery `llm` (после починки Ollama и т.п.).
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Задача принята
          content:
            application/json:
              schema:
                type: object
                required: [recording_session_id, status]
                properties:
                  recording_session_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued]
        "404":
          description: Разговор не найден или сводки отключены
        "503":
          description: LLM-провайдер не настроен

  /api/conversations/{conversation_id}/audio:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    get:
      tags: [conversations]
      summary: Скачать исходное аудио разговора
      description: Файл из хранилища (тот же объект, что был загружен), с расшифровкой на стороне сервера.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Бинарные данные аудио (Content-Type по расширению)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Разговор или аудио не найдены

  /api/conversations/{conversation_id}/diarize:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    post:
      tags: [conversations]
      summary: Запустить диаризацию заново (post-hoc)
      description: >
        Ставит задачу diarization в очередь. При успехе создаётся новая версия транскрипта и
        становится активной. Если diarization уже выполняется, возвращает 409.
        Если diarization.enabled=false в конфигурации сервера — 400.
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  conversation_id: { type: string, format: uuid }
        "400":
          description: Диаризация отключена в конфигурации сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Diarization already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/conversations/{conversation_id}/retranscribe:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    post:
      tags: [conversations]
      summary: Повторное распознавание загруженного аудио (новая ревизия ASR)
      description: >
        Ставит задачу batch ASR на существующий объект audio в S3. При успехе создаётся новая
        версия транскрипта kind=asr и она становится активной. Если ASR уже выполняется — 409.
        При отсутствии загруженного аудио — 400.
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  conversation_id: { type: string, format: uuid }
        "400":
          description: Нет аудио
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Транскрибация уже выполняется
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/conversations/{conversation_id}/transcripts:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    get:
      tags: [conversations]
      summary: Список версий транскрипта разговора
      description: Возвращает историю версий (revision/kind/status) для разговора. UI может использовать позже.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transcripts:
                    type: array
                    items:
                      $ref: "#/components/schemas/TranscriptVersion"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/upload:
    post:
      tags: [upload]
      summary: Загрузка аудио
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: audio_format
          required: false
          description: Явный формат (расширение без точки); иначе — из имени файла или Content-Type
          schema:
            type: string
            enum: [webm, wav, mp3, m4a, aac, ogg, flac, opus]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                conversation_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        "202":
          description: Принято к обработке
          content:
            application/json:
              schema:
                type: object
                required: [conversation_id, audio_object_ext, status, message]
                properties:
                  conversation_id:
                    type: string
                    format: uuid
                  audio_object_ext:
                    type: string
                    description: Нормализованное расширение исходного аудио (ключ в S3 audio.<ext>)
                  status:
                    type: string
                    example: accepted
                  message:
                    type: string
        "400":
          description: Недопустимый audio_format
        "413":
          description: Превышен размер файла

  /api/search:
    get:
      tags: [search]
      summary: Поиск по транскриптам (канон — GET)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: mode
          schema:
            type: string
            enum: [fulltext, semantic]
            default: fulltext
        - in: query
          name: skip
          schema: { type: integer, default: 0 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Результаты
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Неверные параметры

  /api/settings/limits:
    get:
      tags: [settings]
      summary: Публичные лимиты сервера и границы realtime
      description: |
        Без аутентификации (или с опциональной — по политике развёртывания).
        Клиенты кэшируют ответ для клампа полей.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerLimits"

  /api/settings/user:
    get:
      tags: [settings]
      summary: Пользовательские настройки по умолчанию
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "501":
          description: Пока не реализовано (Phase A)
    patch:
      tags: [settings]
      summary: Обновить пользовательские настройки
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsPatch"
      responses:
        "200":
          description: OK
        "501":
          description: Пока не реализовано (Phase A)

  /api/settings/oauth-identities:
    get:
      tags: [settings]
      summary: Привязанные OAuth-идентичности (C7.4)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthIdentity"
        "401":
          description: Не авторизован

  /ws/audio/{conversation_id}:
    get:
      tags: [websocket]
      summary: WebSocket — поток аудио (Upgrade)
      description: |
        Не обычный GET JSON. Установление соединения WebSocket на этот путь.
        Аутентификация: заголовок `Sec-WebSocket-Protocol` с элементом `bearer.<JWT>` (канон в prod).
        Опционально query `access_token` только вне strict-режима (`VT_ENVIRONMENT=production` или `VT_WS_REQUIRE_SUBPROTOCOL`).
        См. docs/WEBSOCKET.md в репозитории.
      parameters:
        - $ref: "#/components/parameters/ConversationId"
        - name: access_token
          in: query
          required: false
          description: JWT (dev / при VT_WS_ALLOW_QUERY_TOKEN); в production недоступен
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols (WebSocket)
        "403":
          description: Отказ (неверный токен или нет доступа к разговору)

  /ws/transcript/{conversation_id}:
    get:
      tags: [websocket]
      summary: WebSocket — поток транскрипта (Upgrade)
      description: |
        Не обычный GET JSON. Аутентификация как у `/ws/audio/{conversation_id}`.
        См. docs/WEBSOCKET.md в репозитории.
      parameters:
        - $ref: "#/components/parameters/ConversationId"
        - name: access_token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols (WebSocket)
        "403":
          description: Отказ

  /admin/api/v1/me:
    get:
      tags: [admin]
      summary: Профиль администратора (аудит сессии консоли)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет записи в admin_memberships

  /admin/api/v1/live-tick:
    get:
      tags: [admin]
      summary: Технический тик для live-обновления (без данных разговоров, §9)
      description: |
        Лёгкий сигнал времени сервера для консоли. В теле ответа только числовые поля контракта;
        идентификаторы разговоров и текст транскриптов не передаются.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLiveTickResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships

  /admin/api/v1/pipeline-settings:
    get:
      tags: [admin]
      summary: Снимок конфигурации пайплайна (без секретов)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPipelineSettingsResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships

  /admin/api/v1/external-tools:
    get:
      tags: [admin]
      summary: Внешние ссылки (Grafana, Flower, …)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminExternalToolsResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships

  /admin/api/v1/infrastructure:
    get:
      tags: [admin]
      summary: PostgreSQL, Redis, основной API, очереди Celery (в т.ч. queue_depth)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInfrastructureResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships

  /admin/api/v1/audit-events:
    get:
      tags: [admin]
      summary: События аудита админки
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: action
          in: query
          schema: { type: string }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
        - name: admin_user_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditEventsResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships

  /admin/api/v1/pipeline-events:
    get:
      tags: [admin]
      summary: Лента событий пайплайна (§9 — без текста разговора)
      description: |
        Неизвестные query-параметры отклоняются с 422. События пишутся воркерами (ASR, диаризация,
        embeddings); поле `detail` содержит только числовые идентификаторы и короткие коды.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
        - name: event_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPipelineEventsResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "422":
          description: Неизвестный query-параметр или невалидные значения

  /admin/api/v1/pipeline-events/wait:
    get:
      tags: [admin]
      summary: Long poll — новые события после курсора или таймаут
      description: |
        Удерживает соединение до появления строк с `(created_at, id)` строго после курсора либо до
        `timeout_seconds`. Неизвестные query-параметры — 422. Аудит админки на каждый цикл не пишется
        (избегание шума); снимок ленты с аудитом — `GET /admin/api/v1/pipeline-events`.
      security:
        - bearerAuth: []
      parameters:
        - name: since_created_at
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: since_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
        - name: event_type
          in: query
          schema: { type: string }
        - name: timeout_seconds
          in: query
          schema: { type: integer, minimum: 1, maximum: 55, default: 25 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPipelineEventsWaitResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "422":
          description: Неизвестный query-параметр или невалидные значения

  /admin/api/v1/conversations:
    get:
      tags: [admin]
      summary: Список разговоров (технические поля, §9)
      description: |
        Неизвестные query-параметры отклоняются с 422. Поля `transcript_revision_count`,
        `session_summary_status`, `session_summary_error` — из БД без S3 HEAD по строкам.
        Поля `asr_chunk_completed` / `asr_chunk_total` относятся к текущей задаче ASR в статусе
        pending/running (прогресс нарезки по времени), если такая есть.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: user_id
          in: query
          schema: { type: string, format: uuid }
        - name: transcript_status
          in: query
          schema: { type: string }
        - name: transcript_kind
          in: query
          schema: { type: string }
        - name: session_summary_status
          in: query
          schema: { type: string }
        - name: session_summary_missing
          in: query
          schema: { type: boolean }
        - name: has_audio
          in: query
          schema: { type: boolean }
        - name: recording_session_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConversationListResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "422":
          description: Неизвестный query-параметр или невалидные значения

  /admin/api/v1/conversations/{conversation_id}:
    get:
      tags: [admin]
      summary: Карточка разговора (технические ревизии и статусы)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConversationDetailResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "404":
          description: Разговор не найден

  /admin/api/v1/conversations/{conversation_id}/actions/retranscribe:
    post:
      tags: [admin]
      summary: Повтор постановки ASR (очередь asr_final)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "202":
          description: Принято
        "400":
          description: Нет аудио / владелец не найден
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "404":
          description: Разговор не найден
        "409":
          description: ASR уже выполняется

  /admin/api/v1/conversations/{conversation_id}/actions/reindex-embedding:
    post:
      tags: [admin]
      summary: Переиндексация embedding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationId"
        - name: transcript_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        "202":
          description: Принято
        "400":
          description: Embeddings выключены или нет подходящего транскрипта
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "404":
          description: Разговор не найден

  /admin/api/v1/conversations/{conversation_id}/actions/rediarize:
    post:
      tags: [admin]
      summary: Повтор диаризации
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "202":
          description: Принято
        "400":
          description: Диаризация выключена в конфиге
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "404":
          description: Разговор не найден
        "409":
          description: Диаризация уже running

  /admin/api/v1/conversations/{conversation_id}/actions/resummary:
    post:
      tags: [admin]
      summary: Повтор постановки rolling session summary (очередь llm)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "202":
          description: Принято
        "400":
          description: Сводка сессии выключена в конфиге
        "401":
          description: Не авторизован
        "403":
          description: Нет admin_memberships
        "404":
          description: Разговор не найден
        "409":
          description: Сводка по цепочке уже running
        "503":
          description: Нет настроенного LLM-провайдера

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Альтернатива — заголовок `X-VT-Api-Key` (секрет из таблицы `user_api_keys`; см. scripts/issue_api_key.py).

  parameters:
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

    TranscriptVersion:
      type: object
      required: [id, revision, kind, status, created_at, updated_at]
      properties:
        id: { type: integer }
        revision: { type: integer }
        kind: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OAuthIdentity:
      type: object
      required: [provider, subject_hint]
      properties:
        provider:
          type: string
          description: Имя провайдера (google, yandex, …)
        provider_email:
          type: string
          nullable: true
          description: Email снимка на момент привязки
        subject_hint:
          type: string
          description: Маска стабильного субъекта провайдера (не полный `sub`)

    UserMe:
      type: object
      required: [id, email, provider]
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор пользователя в системе
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
          description: Отображаемое имя
        provider:
          type: string
          description: Провайдер последней привязки (например google, yandex)

    ExtensionAuthUrlResponse:
      type: object
      required: [auth_url]
      properties:
        auth_url:
          type: string
          format: uri
          description: Полный URL для открытия в launchWebAuthFlow

    ExtensionOAuthUser:
      type: object
      required: [id, email, provider]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        provider:
          type: string

    ExtensionFinalizeResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: Короткоживущий JWT для Authorization Bearer и WebSocket
        refresh_token:
          type: string
          description: Долгоживущий токен сервиса для `POST /api/auth/refresh` (ротируется при каждом refresh)
        user:
          $ref: "#/components/schemas/ExtensionOAuthUser"

    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh-токен сервиса, выданный при login/finalize или предыдущем refresh

    AuthRefreshResponse:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
          description: Новый JWT доступа
        refresh_token:
          type: string
          description: Новый refresh-токен (ротация при каждом успешном вызове)

    ConversationCreate:
      type: object
      properties:
        title:
          type: string
          nullable: true
        ttl_days:
          type: integer
          nullable: true
        realtime_mode:
          type: string
          nullable: true
          enum: [chunk, windowed]
          description: Realtime режим клиента (опционально; валидируется по limits)
        chunk_ms:
          type: integer
          nullable: true
          description: Размер чанка в миллисекундах для realtime (опционально; валидируется по limits)
        previous_conversation_id:
          type: string
          format: uuid
          nullable: true
          description: Продолжение цепочки §7; наследует recording_session_id
        recording_session_id:
          type: string
          format: uuid
          nullable: true
          description: Явный recording_session_id для «головы» (редко; по умолчанию id нового разговора)

    Conversation:
      type: object
      description: >
        Conversation response. Для детального просмотра (GET /api/conversations/{id}) используется расширенная
        схема `ConversationDetail` с полем `transcript` и метаданными активной версии.
      required:
        - id
        - created_at
        - updated_at
        - recording_session_id
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        recording_session_id:
          type: string
          format: uuid
          description: Идентификатор сессии записи (для цепочки автопродления)
        previous_conversation_id:
          type: string
          format: uuid
          nullable: true
          description: Предыдущий разговор в цепочке
        client_realtime_mode:
          type: string
          nullable: true
          description: Realtime режим, переданный клиентом при создании (для UX/диагностики)
        client_chunk_ms:
          type: integer
          nullable: true
          description: Размер чанка, переданный клиентом при создании (для UX/диагностики)
        audio_object_ext:
          type: string
          description: Расширение исходного аудио в S3 (ключ audio.<ext>), например webm, mp3, wav
          default: webm
        duration_seconds:
          type: number
          format: float
